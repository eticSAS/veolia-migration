<div class="sistema-container">
  <div class="sistema-header">
    <h2>Asignación de Sistemas por Usuario</h2>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="success" class="success-message">{{ success }}</div>

  <div class="search-box">
    <div class="form-group">
      <label>Correo del Usuario</label>
      <input
        pInputText
        type="email"
        [(ngModel)]="correo"
        placeholder="usuario@veolia.com"
        (keyup.enter)="buscarSistemas()"
        style="width: 100%"
      />
    </div>
    <p-button
      icon="pi pi-search"
      label="{{ loading ? 'Buscando...' : 'Buscar' }}"
      [loading]="loading"
      (click)="buscarSistemas()"
    ></p-button>
  </div>

  <div *ngIf="sisuId" class="picklist-container">
    <p-pickList
      [source]="listaSistema[0]"
      [target]="listaSistema[1]"
      sourceHeader="SISTEMA SIN ASIGNAR"
      targetHeader="SISTEMA ASIGNADAS"
      [dragdrop]="true"
      [responsive]="true"
      [sourceStyle]="{height: '400px'}"
      [targetStyle]="{height: '400px'}"
      [showSourceControls]="false"
      [showTargetControls]="false"
      breakpoint="1400px"
    >
      <ng-template let-sistema pTemplate="item">
        <div>{{ sistema.SIST_NOMBRE }}</div>
      </ng-template>
    </p-pickList>
  </div>

  <p-button
    *ngIf="sisuId"
    icon="pi pi-save"
    label="{{ loading ? 'Guardando...' : 'Actualizar Asignación de Sistema' }}"
    [loading]="loading"
    (click)="guardar()"
    styleClass="w-full"
  ></p-button>
</div>
