<div class="aps-container">
  <div class="aps-header">
    <h2>Asignación de APS por Usuario</h2>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="success" class="success-message">{{ success }}</div>

  <div class="form-group">
    <label>Usuario</label>
    <p-select
      [options]="usuarioOptions"
      [(ngModel)]="selectedUsuarioId"
      optionLabel="label"
      optionValue="value"
      placeholder="Seleccione un usuario"
      [style]="{width: '100%'}"
      (onChange)="onUsuarioChange()"
    ></p-select>
  </div>

  <div *ngIf="selectedUsuarioId" class="picklist-container">
    <p-pickList
      [source]="listaAps[0]"
      [target]="listaAps[1]"
      sourceHeader="APS SIN ASIGNAR"
      targetHeader="APS ASIGNADAS"
      [dragdrop]="true"
      [responsive]="true"
      [sourceStyle]="{height: '400px'}"
      [targetStyle]="{height: '400px'}"
      [showSourceControls]="false"
      [showTargetControls]="false"
      breakpoint="1400px"
    >
      <ng-template let-aps pTemplate="item">
        <div>{{ aps.APSA_NOMAPS }}</div>
      </ng-template>
    </p-pickList>
  </div>

  <p-button
    *ngIf="selectedUsuarioId"
    icon="pi pi-save"
    label="{{ loading ? 'Guardando...' : 'Actualizar Asignación de APS' }}"
    [loading]="loading"
    (click)="guardar()"
    styleClass="w-full"
  ></p-button>
</div>
